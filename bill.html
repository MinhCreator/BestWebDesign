<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <button class="back-btn">←</button>
        </header>

        <div class="checkout-layout">
            <section class="billing-section">
                <h2>Billing Details</h2>
                <form>
                    <input type="text" placeholder="First Name">
                    <input type="text" placeholder="Last Name">
                    <select><option>Select your Country</option></select>
                    <input type="text" placeholder="Street Address">
                    <select><option>Select your State/Region</option></select>
                    <input type="text" placeholder="Town/City">
                    <input type="tel" placeholder="Phone">
                    <input type="email" placeholder="Email Address">
                </form>
            </section>

            <aside class="order-section">
                <h2>Your Order</h2>
                <div class="order-table">
                    <div class="row header">
                        <span>Product</span>
                        <span>Subtotal</span>
                    </div>
                    <hr>
                    <div class="row item">
                        <span>Loading...</span>
                        <span>$ 0.00</span>
                    </div>
                    
                    <hr>
                    <div class="row total-line">
                        <span>Subtotal</span>
                        <span>$ 0.00</span>
                    </div>
                    <div class="row total-line">
                        <span>Shipping</span>
                        <span>$ 0.00</span>
                    </div>
                    <div class="row total-line">
                        <span>Discount</span>
                        <span>$ 0.00</span>
                    </div>
                    <hr>
                    <div class="row grand-total">
                        <strong>Total</strong>
                        <strong>$ 0.00</strong>
                    </div>
                </div>

                <div class="payment-method">
                    <h3>Choose Payment Method</h3>
                    <div class="method-box">
                        <div class="option active">
                            <input type="radio" name="payment" checked>
                            <label>Credit / Debit Card</label>
                            <div class="card-details">
                                <input type="text" placeholder="1234 1234 1234 1234" class="full">
                                <div class="row">
                                    <input type="text" placeholder="MM / YY">
                                    <input type="text" placeholder="CVC">
                                </div>
                            </div>
                        </div>
                        <div class="option">
                            <input type="radio" name="payment"> <label>Paypal</label>
                        </div>
                        <div class="option">
                            <input type="radio" name="payment"> <label>Cash on Delivery</label>
                        </div>
                    </div>
                </div>

                <button class="place-order-btn">Place Order</button>
            </aside>
        </div>
    </div>

    <script>
        window.onload=function()
        {
            const storedCart=localStorage.getItem('cartData');
            const container=document.getElementById('order-items-container');
            const totalVal=document.getElementById('total-val');
            const subtotalVal=document.getElementById('subtotal-val');

            if(storedCart)
            {
                const cartItems=JSON.parse(storedCart);
                let total=0;
                let html="";

                cartItems.forEach(item=>
                    {
                        total+=item.price;
                        html+=`<div class="row item">
                                    <span>${item.name}</span>
                                    <span>${item.price.toFixed(2)}</span>
                                </div>
                                    `;
                    }
                );
                container.innerHTML=html;
                totalVal.innerText=`$ ${total.toFixed(2)}`;
                subtotalVal.innerText=`$ ${total.toFixed(2)}`;
            }else{
                container.innerHTML=`<div class="row item"><span>No items selected</span><span>$ 0.00</span></div>`;
            }
        };
    </script>
</body>
</html>
